<svg viewBox="0 0 820 250" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono', 'Fira Code', Consolas, Monaco, monospace">
  <defs>
    <style>
      .line { opacity: 0; animation: reveal 0.5s ease-out forwards; }
      .l1 { animation-delay: 0.2s; }
      .l2 { animation-delay: 0.8s; }
      .l3 { animation-delay: 1.6s; }
      .l4 { animation-delay: 2.0s; }
      .l5 { animation-delay: 2.4s; }
      .l6 { animation-delay: 3.0s; }
      .l7 { animation-delay: 3.8s; }
      @keyframes reveal {
        from { opacity: 0; transform: translateX(-6px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      .cursor {
        animation: blink 1s steps(1) infinite;
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      text { font-size: 15px; }
    </style>
  </defs>

  <!-- window frame -->
  <rect x="0" y="0" width="820" height="250" rx="12" fill="#0a0e14" stroke="#1c2530" stroke-width="1.5"/>
  <!-- title bar -->
  <rect x="0" y="0" width="820" height="34" rx="12" fill="#10151c"/>
  <rect x="0" y="22" width="820" height="12" fill="#10151c"/>
  <circle cx="24" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="17" r="6" fill="#27c93f"/>
  <text x="410" y="22" fill="#5b6675" font-size="13" text-anchor="middle">abraham.dart — zsh</text>

  <!-- body -->
  <g transform="translate(28, 62)">
    <text class="line l1"><tspan fill="#84cc16">$</tspan><tspan fill="#c9d1d9"> whoami</tspan></text>
    <text class="line l2" y="26" fill="#2dd4bf" font-weight="600">abraham_sajan · flutter engineer · ai &amp; backend</text>

    <text class="line l3" y="60"><tspan fill="#84cc16">$</tspan><tspan fill="#c9d1d9"> cat focus.txt</tspan></text>
    <text class="line l4" y="84" fill="#8b949e">  → genai-powered mobile experiences</text>
    <text class="line l5" y="106" fill="#8b949e">  → real-time voice pipelines (vertex ai)</text>
    <text class="line l6" y="128" fill="#8b949e">  → iot-connected apps (ble / wi-fi)</text>

    <text class="line l7" y="160"><tspan fill="#84cc16">$</tspan><tspan fill="#c9d1d9"> echo $STATUS</tspan></text>
    <text class="line l7" y="160" x="230" fill="#f59e0b" font-weight="600">compiling career… ready for production ✓</text>
    <rect class="line l7 cursor" x="620" y="147" width="9" height="16" fill="#a3e635"/>
  </g>
</svg>
